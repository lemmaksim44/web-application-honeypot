name: CI/CD
on:
  push:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          cd app
          rm .env
          touch .env
          echo "DJANGO_KEY=${{ secrets.DJANGO_KEY }}" >> .env
          echo "GOOGLE_SITE_PUBLIC_KEY=${{ secrets.GOOGLE_SITE_PUBLIC_KEY }}" >> .env
          echo "GOOGLE_SITE_PRIVATE_KEY=${{ secrets.GOOGLE_SITE_PRIVATE_KEY }}" >> .env
          echo "CLOUDFLARE_SITE_PUBLIC_KEY=${{ secrets.CLOUDFLARE_SITE_PUBLIC_KEY }}" >> .env
          echo "CLOUDFLARE_SITE_PRIVATE_KEY=${{ secrets.CLOUDFLARE_SITE_PRIVATE_KEY }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/experiment-ci-cd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/experiment-ci-cd:latest

            docker stop app || true
            docker rm app || true

            docker run -d \
              --name app \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/experiment-ci-cd:latest