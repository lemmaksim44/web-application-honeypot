name: CI/CD
on:
  push:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << EOF
          DJANGO_KEY=${{ secrets.DJANGO_KEY }}
          GOOGLE_SITE_PUBLIC_KEY=${{ secrets.GOOGLE_SITE_PUBLIC_KEY }}
          GOOGLE_SITE_PRIVATE_KEY=${{ secrets.GOOGLE_SITE_PRIVATE_KEY }}
          CLOUDFLARE_SITE_PUBLIC_KEY=${{ secrets.CLOUDFLARE_SITE_PUBLIC_KEY }}
          CLOUDFLARE_SITE_PRIVATE_KEY=${{ secrets.CLOUDFLARE_SITE_PRIVATE_KEY }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/experiment-ci-cd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  